<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jupiter</title>

<body>
    <header>
        <div id="headerCabecalho">
            <h1>BabelGames</h1>

            <div>
                <a href="/login">Login</a>
                <a href="/sign_in">Register</a>
            </div>
        </div>
    </header>
    
    <main class="container">
        <div id="bodyMain">
        <section class="login">
            <h2>Login</h2>

            <input id="username" placeholder="Nome">
            <input id="password" placeholder="Senha">
        
            <button onclick="login()">Entrar</button>        
        </section>
        </div>
    </main>

    <footer>
        <a href="https://www.youtube.com/watch?v=Zj7_mUZ6Cpw">Créditos | Fale conosco</a>

</html>

    <script>
        async function login(){
        
            const username = document.getElementById("username").value
            const password = document.getElementById("password").value
        
            const params = new URLSearchParams()
            params.append("username", username)
            params.append("password", password)
        
            const resposta = await fetch("/login", {
                method: "POST",
                body: params
            })
        
            if (resposta.ok) {
                window.location.href = "/home"
            } else {
                console.log(resposta)
                alert("sexo inválidas")
            }
        }
    </script>
