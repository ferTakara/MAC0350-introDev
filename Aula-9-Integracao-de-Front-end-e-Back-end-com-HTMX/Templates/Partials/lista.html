<input type="text"  
       placeholder="Buscar..."
       name="busca"

       hx-get="/lista"
       hx-target="#lista"
       hx-trigger="input changed delay:500ms"
       hx-select="#lista"
       hx-include="this">

<div id="lista">

    <ul>
        {% for aluno in alunos %}
            <li>{{ aluno.id }} {{ aluno.nome }}</li>
        {% else %}
            <li>Não há alunos</li>
        {% endfor %}
    </ul>

    <!-- 🔥 PAGINAÇÃO -->
    <div class="pagination">
        <button 
            hx-get="/lista?page={{ page-1 }}&busca={{ busca }}"
            hx-target="#lista"
            hx-select="#lista"
            {% if page == 1 %}disabled{% endif %}
        >
            Anterior
        </button>

        <button 
            hx-get="/lista?page={{ page+1 }}&busca={{ busca }}"
            hx-target="#lista"
            hx-select="#lista"
            {% if not has_next %}disabled{% endif %}
        >
            Próxima
        </button>

    </div>

</div>
