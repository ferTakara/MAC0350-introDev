<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/styleLoginRegister.css">

    <style>
        body {
            background-color: #121318;
            color: white;
            margin: 0;
        }

        .container {
            display: flex;
        }

        /* 🔹 SIDEBAR */
        .sidebar {
            width: 250px;
            background: #181a21;
            padding: 20px;
            height: 100vh;
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        .menu a {
            display: block;
            padding: 10px;
            color: #ccc;
            text-decoration: none;
            border-radius: 8px;
        }

        .menu a:hover {
            background: #181a21;
        }

        /* 🔹 CONTEÚDO */
        .content {
            flex: 1;
            padding: 20px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
        }

        /* 🔹 STATS */
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #181a21;
            padding: 15px;
            border-radius: 10px;
            min-width: 120px;
            text-align: center;
        }

        .empty {
            margin-top: 40px;
            color: #777;
        }
    </style>

    <script>
        async function carregarPerfil() {
            const res = await fetch("/profile_data");

            if (res.ok) {
                const data = await res.json();
                document.getElementById("avatar").src = data.avatar;

                document.getElementById("totalGames").innerText = data.total_games;
                document.getElementById("played2026").innerText = data.played_2026;
                document.getElementById("reviewsCount").innerText = data.reviews;
            }
        }

        async function adicionarJogo(event) {
            // Impede que o link recarregue a página antes da hora
            event.preventDefault();

            const nomeJogo = prompt("Qual o nome do jogo que você deseja adicionar?");

            // Se o usuário cancelar ou deixar vazio, não fazemos nada
            if (!nomeJogo || nomeJogo.trim() === "") {
                return;
            }

            try {
                const response = await fetch("/post_add_game", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ game_name: nomeJogo })
                });

                if (response.ok) {
                    alert("Jogo adicionado com sucesso!");
                    // Recarrega a página para atualizar os stats
                    window.location.reload(); 
                } else {
                    const errorData = await response.json();
                    alert("Erro ao adicionar jogo: " + (errorData.detail || "Erro desconhecido"));
                }
            } catch (error) {
                console.error("Erro na requisição:", error);
                alert("Não foi possível conectar ao servidor.");
            }
        }

        window.onload = carregarPerfil;
    </script>
</head>

<body>

<div class="container">

    <!-- 🔹 SIDEBAR -->
    <div class="sidebar">
        <h2 id="username">BabelGames</h2>

        <div class="menu">
            <a href="#">Profile</a>
            <a href="#">Games</a>
            <a href="#">Journal</a>
            <a href="#">Activity</a>
            <a href="#">Reviews</a>
            <a href="#">Friends</a>
        </div>
    </div>

    <!-- 🔹 CONTEÚDO -->
    <div class="content">

        <div class="profile-header">
            <img id="avatar" class="avatar" src="/static/avatar.png">
            <h1 id="username">{{username}}</h1>
        </div>

        <div class="empty">
            Nothing here!
        </div>

        <!-- 🔹 STATS -->
        <div class="stats">
            <div class="card">
                <h3 id="reviewsCount">0</h3>
                <p>Reviews</p>
            </div>

            <div class="card">
                <h3 id="totalGames">0</h3>
                <p>Total Games</p>
            </div>

            <div class="card">
                <h3 id="played2026">0</h3>
                <p>Played in 2026</p>
            </div>
        </div>

        
        <button type="button" 
            hx-get="/add_game_form"
            hx-target="body"
            hx-swap="beforeend">
            Add games
        </button>
    </div>

</div>

</body>
</html>
