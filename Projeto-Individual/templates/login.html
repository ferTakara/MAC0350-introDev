<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/styleLoginRegister.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jupiter</title>
    
    <script>
        async function login(){
            try {
                const username = document.getElementById("username").value
                const password = document.getElementById("password").value
            
                const params = new URLSearchParams()
                params.append("username", username)
                params.append("password", password)
            
                const resposta = await fetch("/login", {
                    method: "POST",
                    body: params
                })

                console.log(resposta)
            
                if (resposta.ok) {
                    window.location.href = "/home"
                } else {
                    console.log(resposta)
                    alert("Credenciais inválidas")
                }
            }
            catch (err) {
                console.error("Erro:", err);
            }
        }
    </script>
</head>

<body>
    <header>
        <div id="headerCabecalho">
            <h1>BabelGames</h1>

            <div>
                <a href="/login">Login</a>
                <a href="/sign_in">Register</a>
            </div>
        </div>
    </header>
    
    <main>
        <div id="bodyMain">
            <section class="login-card">
                <h2>Login</h2>

                <form id="forms">                        
                    <input id="username" type="text" placeholder="Username" required>
                    <input id="password" type="password" placeholder="Password" required>
                    <button type="button" onclick="login()">Entrar</button>   
                </form>

                <p class="register-link">
                    Don't have an account? <a href="/sign_in">Register</a>
                </p>
            </section>
        </div>
    </main>

    <footer>
        <a href="https://www.youtube.com/watch?v=Zj7_mUZ6Cpw">Créditos | Fale conosco</a>
        <a>© 1999 - 2026 - Superintendência de Tecnologia da Informação/USP</a> 
    </footer>
</body>

</html>
